services:
  db:
    image: postgres:16
    container_name: arrow_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arrow_platform}
      POSTGRES_USER: ${POSTGRES_USER:-arrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arrow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - arrow_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  arrow_platform_pgdata:
